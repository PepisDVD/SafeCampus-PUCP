name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

# Cancela ejecuciones previas del mismo branch/PR cuando llega un push nuevo.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (lint · test · typecheck · build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  backend:
    name: Backend (ruff · mypy · pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/backend/pyproject.toml

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # --- Calidad de código (advisory) ---
      # El backend arrastra deuda preexistente de lint/tipos, por lo que estos
      # pasos son informativos (continue-on-error) y NO bloquean el merge todavía.
      # A medida que se limpie la deuda, quitar `continue-on-error` para volverlos
      # gates obligatorios (empezando por ruff format y luego ruff check / mypy).
      - name: Ruff format check (advisory)
        continue-on-error: true
        run: ruff format --check .

      - name: Ruff lint (advisory)
        continue-on-error: true
        run: ruff check --output-format=github .

      - name: Mypy type check (advisory)
        continue-on-error: true
        run: mypy app

      # --- Gate obligatorio ---
      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/postgres?ssl=require
        run: pytest -q -p no:cacheprovider
