# 📁 infra/docker/docker-compose.dev.yml
# 🎯 Levantar PostgreSQL 16 + PostGIS 3.4 para desarrollo local con volumen persistente.
# 📦 Capa: Infraestructura / Docker

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: safecampus-db
    environment:
      POSTGRES_DB: safecampus
      POSTGRES_USER: safecampus
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - safecampus_pgdata:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ../db/enums.sql:/docker-entrypoint-initdb.d/02-enums.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safecampus -d safecampus"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  safecampus_pgdata:
