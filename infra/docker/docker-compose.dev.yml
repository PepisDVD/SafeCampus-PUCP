# Infra local auxiliar para desarrollo SafeCampus.
# La base de datos es remota en Supabase (no se levanta Postgres local).

services:
  redis:
    image: redis:7-alpine
    container_name: safecampus-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - safecampus_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: safecampus-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  safecampus_redis_data:
